spring:
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          type: ${spring.datasource.type}
          driver-class-name: org.postgresql.Driver
          url: ${datasource.system-master.url}
          username: ${datasource.system-master.username}
          password: ${datasource.system-master.password}

mybatis-plus:
  mapper-package: org.dromara.appcenter.mapper
  type-aliases-package: org.dromara.appcenter.domain

# 租户过滤：app_* 表中仅 app_application 含 tenant_id，其余需排除
tenant:
  excludes:
    - app_category
    - app_favorite
    - app_message
    - app_recommend
