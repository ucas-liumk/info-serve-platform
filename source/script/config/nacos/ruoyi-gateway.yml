# 安全配置
security:
  # 不校验白名单
  ignore:
    whites:
      - /auth/code
      - /auth/logout
      - /auth/login
      - /auth/binding/*
      - /auth/register
      - /auth/tenant/list
      - /file/sms/code
      - /file/sse/close
      - /*/v3/api-docs
      - /*/error
      - /csrf

spring:
  cloud:
    # 网关配置
    gateway:
      # 打印请求日志(自定义)
      requestLog: true
      server:
        webflux:
          discovery:
            locator:
              lowerCaseServiceId: true
              enabled: true
          routes:
            # 认证中心
            - id: ruoyi-auth
              uri: lb://ruoyi-auth
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            # 系统模块
            - id: ruoyi-system
              uri: lb://ruoyi-system
              predicates:
                - Path=/system/**,/monitor/**
              filters:
                - StripPrefix=1
            # 资源服务
            - id: ruoyi-file
              uri: lb://ruoyi-file
              predicates:
                - Path=/file/**
              filters:
                - StripPrefix=1
            # 门户内核服务（统计/消息/模块注册表，从 ruoyi-portal 拆出）
            - id: portal-kernel-messages
              uri: lb://portal-kernel
              predicates:
                - Path=/appcenter/portal/messages/**
              filters:
                - StripPrefix=1
              order: -10
            - id: portal-kernel
              uri: lb://portal-kernel
              predicates:
                - Path=/infoservice/portal/stats,/infoservice/portal/modules/**,/infoservice/module/**
              filters:
                - StripPrefix=1
              order: -10
            # 门户业务服务（应用中心/资料共享/服务论坛，API 路径保持兼容）
            - id: portal-requiredknowledge
              uri: lb://portal-requiredknowledge
              predicates:
                - Path=/infoservice/required-knowledge/**,/infoservice/portal/required-knowledge/**
              filters:
                - StripPrefix=1
              order: -5
            - id: ruoyi-portal-appcenter
              uri: lb://ruoyi-portal
              predicates:
                - Path=/appcenter/**
              filters:
                - StripPrefix=1
            - id: ruoyi-portal-infoservice
              uri: lb://ruoyi-portal
              predicates:
                - Path=/infoservice/**
              filters:
                - StripPrefix=1
