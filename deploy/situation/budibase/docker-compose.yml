name: infosys-budibase

services:
  app-service:
    image: ${BUDIBASE_APPS_IMAGE:-budibase/apps:latest}
    container_name: dataplatform-budibase-apps
    restart: unless-stopped
    environment:
      SELF_HOSTED: "1"
      COUCH_DB_URL: http://${COUCH_DB_USER}:${COUCH_DB_PASSWORD}@couchdb-service:5984
      WORKER_URL: http://worker-service:4003
      MINIO_URL: http://minio-service:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BUDIBASE_ENVIRONMENT: ${BUDIBASE_ENVIRONMENT}
      PORT: 4002
      API_ENCRYPTION_KEY: ${API_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: info
      ENABLE_ANALYTICS: "false"
      REDIS_URL: redis-service:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      LITELLM_URL: ${LITELLM_URL:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      BB_ADMIN_USER_EMAIL: ${BB_ADMIN_USER_EMAIL}
      BB_ADMIN_USER_PASSWORD: ${BB_ADMIN_USER_PASSWORD}
      PLUGINS_DIR: ${PLUGINS_DIR}
      OFFLINE_MODE: ${OFFLINE_MODE:-true}
      ROLLING_LOG_MAX_SIZE: ${ROLLING_LOG_MAX_SIZE:-}
    depends_on:
      - worker-service
      - redis-service
    networks:
      - infosys-ruoyi-cloud-plus

  worker-service:
    image: ${BUDIBASE_WORKER_IMAGE:-budibase/worker:latest}
    container_name: dataplatform-budibase-worker
    restart: unless-stopped
    environment:
      SELF_HOSTED: "1"
      PORT: 4003
      CLUSTER_PORT: ${MAIN_PORT}
      API_ENCRYPTION_KEY: ${API_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_URL: http://minio-service:9000
      APPS_URL: http://app-service:4002
      COUCH_DB_USERNAME: ${COUCH_DB_USER}
      COUCH_DB_PASSWORD: ${COUCH_DB_PASSWORD}
      COUCH_DB_URL: http://${COUCH_DB_USER}:${COUCH_DB_PASSWORD}@couchdb-service:5984
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      REDIS_URL: redis-service:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      LITELLM_URL: ${LITELLM_URL:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OFFLINE_MODE: ${OFFLINE_MODE:-true}
    depends_on:
      - redis-service
      - minio-service
    networks:
      - infosys-ruoyi-cloud-plus

  proxy-service:
    image: ${BUDIBASE_PROXY_IMAGE:-budibase/proxy:latest}
    container_name: dataplatform-budibase-proxy
    restart: unless-stopped
    ports:
      - "0.0.0.0:${MAIN_PORT:-18100}:10000"
    environment:
      PROXY_RATE_LIMIT_WEBHOOKS_PER_SECOND: 10
      PROXY_RATE_LIMIT_API_PER_SECOND: 50
      APPS_UPSTREAM_URL: http://app-service:4002
      WORKER_UPSTREAM_URL: http://worker-service:4003
      MINIO_UPSTREAM_URL: http://minio-service:9000
      COUCHDB_UPSTREAM_URL: http://couchdb-service:5984
      RESOLVER: 127.0.0.11
    depends_on:
      - minio-service
      - worker-service
      - app-service
      - couchdb-service
    networks:
      - infosys-ruoyi-cloud-plus

  couchdb-service:
    image: ${BUDIBASE_DATABASE_IMAGE:-budibase/database:2.1.0}
    container_name: dataplatform-budibase-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_PASSWORD: ${COUCH_DB_PASSWORD}
      COUCHDB_USER: ${COUCH_DB_USER}
      TARGETBUILD: docker-compose
      DATA_DIR: /data
    volumes:
      - couchdb3_data:/data
    networks:
      - infosys-ruoyi-cloud-plus

  minio-service:
    image: ${BUDIBASE_MINIO_IMAGE:-minio/minio:latest}
    container_name: dataplatform-budibase-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BROWSER: "off"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - infosys-ruoyi-cloud-plus

  redis-service:
    image: ${BUDIBASE_REDIS_IMAGE:-redis:7.4-alpine}
    container_name: dataplatform-budibase-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    networks:
      - infosys-ruoyi-cloud-plus

  litellm-service:
    profiles:
      - ai
    image: ${BUDIBASE_LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-v1.83.10-stable}
    container_name: dataplatform-budibase-litellm
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${LITELLM_DB_USER}:${LITELLM_DB_PASSWORD}@litellm-db:5432/${LITELLM_DB_NAME}
      STORE_MODEL_IN_DB: "True"
      LITELLM_REASONING_AUTO_SUMMARY: "true"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
    command: ["--config", "/app/config.yaml"]
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    depends_on:
      - litellm-db
    networks:
      - infosys-ruoyi-cloud-plus

  litellm-db:
    profiles:
      - ai
    image: ${BUDIBASE_LITELLM_DB_IMAGE:-postgres:16-alpine}
    container_name: dataplatform-budibase-litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LITELLM_DB_NAME}
      POSTGRES_USER: ${LITELLM_DB_USER}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - litellm_data:/var/lib/postgresql/data
    networks:
      - infosys-ruoyi-cloud-plus

volumes:
  couchdb3_data:
  minio_data:
  redis_data:
  litellm_data:

networks:
  infosys-ruoyi-cloud-plus:
    external: true
