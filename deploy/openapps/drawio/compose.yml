services:
  drawio:
    image: ${IMAGE}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "${OPENAPPS_BIND_ADDR}:${PORT}:8080"
    environment:
      TZ: ${TZ}
      DRAWIO_SELF_CONTAINED: "1"
      ENABLE_DRAWIO_PROXY: "0"
    mem_limit: 768m
    cpus: 1.0
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}
