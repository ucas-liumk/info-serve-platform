services:
  searxng:
    image: ${IMAGE}
    pull_policy: never
    restart: unless-stopped
    ports:
      - "${OPENAPPS_BIND_ADDR}:${PORT}:8080"
    environment:
      TZ: ${TZ}
      SEARXNG_BASE_URL: ${PUBLIC_BASE_URL}
      SEARXNG_SECRET: ${SEARXNG_SECRET}
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - searxng_cache:/var/cache/searxng
    mem_limit: 512m
    cpus: 0.75
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

volumes:
  searxng_cache:
