name: infosys-ruoyi-cloud-plus

x-ruoyi-env: &ruoyi-env
  TZ: Asia/Shanghai
  SPRING_PROFILES_ACTIVE: prod
  SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_USERNAME: ${NACOS_USERNAME}
  SPRING_CLOUD_NACOS_PASSWORD: ${NACOS_PASSWORD}
  NACOS_USERNAME: ${NACOS_USERNAME}
  NACOS_PASSWORD: ${NACOS_PASSWORD}
  JAVA_OPTS: >-
    -Xms256m -Xmx768m
    -Dspring.cloud.nacos.server-addr=nacos:8848
    -Dspring.cloud.nacos.config.server-addr=nacos:8848
    -Dspring.cloud.nacos.discovery.server-addr=nacos:8848
    -Dspring.cloud.nacos.username=${NACOS_USERNAME}
    -Dspring.cloud.nacos.password=${NACOS_PASSWORD}

services:
  mysql:
    image: ${MYSQL_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: "%"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --explicit_defaults_for_timestamp=true
      - --lower_case_table_names=1
    ports:
      - "127.0.0.1:8136:3306"
    volumes:
      - ../data/mysql:/var/lib/mysql
      - ./initdb-mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 40
    networks:
      - infosys-ruoyi-cloud-plus

  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:8132:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
      - ./initdb-postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 40
    networks:
      - infosys-ruoyi-cloud-plus

  redis:
    image: ${REDIS_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    ports:
      - "127.0.0.1:8179:6379"
    volumes:
      - ../data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - infosys-ruoyi-cloud-plus

  rabbitmq:
    image: ${RABBITMQ_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-rabbitmq
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "127.0.0.1:8172:5672"
      - "127.0.0.1:8173:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ../logs/rabbitmq:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - infosys-ruoyi-cloud-plus

  minio:
    image: ${MINIO_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-minio
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server --address ":9000" --console-address ":9001" /data
    ports:
      - "0.0.0.0:8160:9000"
      - "0.0.0.0:8161:9001"
    volumes:
      - ../data/minio:/data
      - ../data/minio-config:/root/.minio
    networks:
      - infosys-ruoyi-cloud-plus

  minio-init:
    image: ${MINIO_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-minio-init
    restart: "no"
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        for i in $$(seq 1 60); do
          mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" && break;
          sleep 2;
        done;
        mc mb -p local/ruoyi;
        mc anonymous set download local/ruoyi;
    networks:
      - infosys-ruoyi-cloud-plus

  nacos:
    image: ${NACOS_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-nacos
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: >-
        -Xms256m -Xmx512m
        -Ddb.url.0=jdbc:mysql://mysql:3306/ry-config?characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        -Ddb.user.0=root
        -Ddb.password.0=${MYSQL_ROOT_PASSWORD}
        -Dspring.boot.admin.client.enabled=false
    ports:
      - "127.0.0.1:8148:8848"
      - "127.0.0.1:9148:9848"
      - "127.0.0.1:9149:9849"
    volumes:
      - ../logs/nacos:/ruoyi/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8848'"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s
    networks:
      - infosys-ruoyi-cloud-plus

  ruoyi-monitor:
    image: ${MONITOR_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-monitor
    restart: unless-stopped
    environment:
      <<: *ruoyi-env
      SERVER_PORT: 8190
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - ../logs/monitor:/ruoyi/monitor/logs
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - infosys-ruoyi-cloud-plus

  ruoyi-gateway:
    image: ${GATEWAY_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-gateway
    restart: unless-stopped
    environment:
      <<: *ruoyi-env
      SERVER_PORT: 8180
    ports:
      - "0.0.0.0:8180:8180"
    volumes:
      - ../logs/gateway:/ruoyi/gateway/logs
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - infosys-ruoyi-cloud-plus

  ruoyi-auth:
    image: ${AUTH_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-auth
    restart: unless-stopped
    environment:
      <<: *ruoyi-env
      SERVER_PORT: 8110
    volumes:
      - ../logs/auth:/ruoyi/auth/logs
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - infosys-ruoyi-cloud-plus

  ruoyi-system:
    image: ${SYSTEM_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-system
    restart: unless-stopped
    environment:
      <<: *ruoyi-env
      SERVER_PORT: 8101
    volumes:
      - ../logs/system:/ruoyi/system/logs
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - infosys-ruoyi-cloud-plus

  ruoyi-portal:
    image: ${PORTAL_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-portal
    restart: unless-stopped
    environment:
      <<: *ruoyi-env
      SERVER_PORT: 8107
      INFOSERVICE_PREVIEW_CACHE_DIR: ${INFOSERVICE_PREVIEW_CACHE_DIR:-/ruoyi/portal/preview-cache}
      INFOSERVICE_PREVIEW_CACHE_SOFFICE: ${INFOSERVICE_PREVIEW_CACHE_SOFFICE:-soffice}
      INFOSERVICE_PREVIEW_CACHE_TIMEOUT_SECONDS: ${INFOSERVICE_PREVIEW_CACHE_TIMEOUT_SECONDS:-120}
    volumes:
      - ../logs/portal:/app/logs
      - ../data/preview-cache:/ruoyi/portal/preview-cache
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ruoyi-file:
        condition: service_started
    networks:
      - infosys-ruoyi-cloud-plus

  ruoyi-file:
    image: ${FILE_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-file
    restart: unless-stopped
    environment:
      <<: *ruoyi-env
      SERVER_PORT: 8114
    volumes:
      - ../logs/file:/app/logs
      - ../data/resource:/ruoyi/resource/upload
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - infosys-ruoyi-cloud-plus

  nginx-web:
    image: ${NGINX_IMAGE}
    container_name: infosys-ruoyi-cloud-plus-web
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "0.0.0.0:7010:80"
    volumes:
      - ../plus-ui/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../logs/nginx:/var/log/nginx
    depends_on:
      ruoyi-gateway:
        condition: service_started
    networks:
      - infosys-ruoyi-cloud-plus

networks:
  infosys-ruoyi-cloud-plus:
    name: infosys-ruoyi-cloud-plus

volumes:
  rabbitmq_data:
    name: infosys-ruoyi-cloud-plus-rabbitmq-data
