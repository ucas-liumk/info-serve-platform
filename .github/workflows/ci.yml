name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff whitespace
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "${{ github.event.before }}..${{ github.sha }}"
          else
            git diff --check HEAD
          fi

      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t scripts < <(find . -type f -name "*.sh" -not -path "./.git/*" | sort)
          if (( ${#scripts[@]} == 0 )); then
            echo "No shell scripts found."
            exit 0
          fi
          for script in "${scripts[@]}"; do
            bash -n "$script"
          done

  frontend:
    name: Frontend build and design audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plus-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plus-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production frontend
        run: npm run build:prod

      - name: Run design token audit
        run: npm run design:audit
